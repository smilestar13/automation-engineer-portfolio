---
- name: Collect node setup and configuration files from all hosts
  hosts: all
  become: true
  gather_facts: true

  vars:
    remote_base: "{{ ansible_env.HOME }}/node-setup"
    local_base: "{{ lookup('env', 'HOME') }}/node-backups"

    files_to_collect:
      - node-keypair.json
      - service-keypair.json
      - identity.pem
      - node-keypair.seed.txt
      - service-keypair.seed.txt
      - cluster-info.toml

  tasks:
    - name: Ensure local base backup directory exists on controller
      delegate_to: localhost
      run_once: true
      become: false
      ansible.builtin.file:
        path: "{{ local_base }}"
        state: directory
        mode: "0755"

    - name: Ensure per-host backup directory exists on controller
      delegate_to: localhost
      become: false
      ansible.builtin.file:
        path: "{{ local_base }}/{{ inventory_hostname }}"
        state: directory
        mode: "0700"

    - name: Check remote files
      ansible.builtin.stat:
        path: "{{ remote_base }}/{{ item }}"
        get_checksum: false
      loop: "{{ files_to_collect }}"
      loop_control:
        label: "{{ remote_base }}/{{ item }}"
      register: node_file_stats

    - name: Fetch existing files to controller
      ansible.builtin.fetch:
        src: "{{ item.stat.path }}"
        dest: "{{ local_base }}/{{ inventory_hostname }}/{{ item.stat.path | basename }}"
        flat: true
        fail_on_missing: false
      loop: "{{ node_file_stats.results | selectattr('stat.exists', 'defined') | selectattr('stat.exists') | list }}"
      loop_control:
        label: "{{ item.stat.path }}"

    - name: Report missing files
      when: item.stat is defined and not item.stat.exists
      ansible.builtin.debug:
        msg: "Missing file: {{ remote_base }}/{{ item.item }}"
      loop: "{{ node_file_stats.results }}"
      loop_control:
        label: "{{ remote_base }}/{{ item.item }}"

    - name: Show backup location
      delegate_to: localhost
      run_once: true
      become: false
      ansible.builtin.debug:
        msg: "Backups saved under {{ local_base }}/<hostname>/"
